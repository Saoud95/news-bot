name: Daily News Bot

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'politics'
        type: choice
        options:
          - politics
          - football

jobs:
  run-politics:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'politics') ||
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 0 * * *' ||
        github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 12 * * *' ||
        github.event.schedule == '0 18 * * *'
      ))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      -
